<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link rel="icon" type="image/png" href="robot.png">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <!-- <script src="https://unpkg.com/supersimpledev/chatbot.js"></script> -->
    <script src="chatResponse.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->



    <script type="text/babel">




        // Input field for the user to type a message
        function ChatInput({ sendMessage }) {

            const [text, setText] = React.useState('')

            function saveText(e) {
                setText(e.target.value)
                // console.log(e.target.value)
            }

            return (
                <div className="input-container">

                    <input className="chat-input" placeholder="Send a message" size="30" onChange={saveText} value={text} />
                    <button onClick={() => {
                        sendMessage(text);
                        setText("");
                    }}>
                        Send
                    </button>
                </div>
            )
        }

        // Displays the message
        function ChatMessage({ text, sender }) {

            return (
                <div className={sender === 'user' ? 'user-message' : 'bot-message'}>
                    {sender === 'user' && (
                        <>
                            <div className="user-text">{text}</div>
                            <img className="image" src="user.png" />
                        </>
                    )}

                    {sender === 'bot' && (
                        <>
                            <img className="image" src="robot.png" />
                            <div className="bot-text">{text}</div>
                        </>
                    )}
                </div>
            )
        }


        // Define list of messages , 
        function MessagesList() {

                      const [messages, SetMessages] = React.useState([{
                text: 'Hey bot, what can u do?',
                sender: 'user',
                id: "3"
            }, {
                text: 'Hey! I can answer simple questions, like math, history, and more. What would you like to know?',
                sender: 'bot',
                id: "4"
            }])

            function sendMessage(text) {
                const response = Chatbot.getResponse(text);
                // console.log(response)
                if (text.trim() === "") return;
                SetMessages(
                    [
                        ...messages,
                        {
                            text: text,
                            sender: 'user',
                            id: crypto.randomUUID()
                        },
                        {
                            text: response,
                            sender: 'bot',
                            id: crypto.randomUUID()
                        }
                    ]
                )

            }

            const autoScroll = React.useRef(null)

            React.useEffect(() => {
                const ContainerElem = autoScroll.current
                if (ContainerElem) {
                    ContainerElem.scrollTop = ContainerElem.scrollHeight
                }
            }, [messages])

            // Inserts each prop into ChatMessage
            return (
                <div className="all-container">
                    <ChatInput sendMessage={sendMessage} />

                    <div className="chat-container" ref={autoScroll}>
                        {messages.map((message) => {
                            return (
                                <ChatMessage text={message.text} sender={message.sender} key={message.id} />
                            )
                        })}
                    </div>
                    <p className="developer"> Developed by <span className="name">Abdalla Esmat</span> </p>

                </div>
            )
        }


        function App() {
            return (
                <>
                    <MessagesList />
                </>
            )
        }

        const Container = document.querySelector('.js-container')
        ReactDOM.createRoot(Container).render(<App />);
    </script>

</body>

</html>
